services:
  bot:
    build: .
    restart: unless-stopped
    mem_limit: ${BOT_MEMORY_LIMIT:-256m}
    depends_on:
      mongo:
        condition: service_healthy
      lavalink:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8080
      TOKEN: ${TOKEN:-}
      TOKENS: ${TOKENS:-}
      BOT_TOKENS: ${BOT_TOKENS:-}
      PREFIX: ${PREFIX:-.}
      OWNERID: ${OWNERID:-}
      SPOTIFYID: ${SPOTIFYID:-}
      SPOTIFYSECRET: ${SPOTIFYSECRET:-}
      MONGO_URI: mongodb://mongo:27017/lofi-radio
      COLOR: ${COLOR:-#DDBD86}
      LOGS: ${LOGS:-}
      SUPPORT: ${SUPPORT:-}
      INVITE: ${INVITE:-}
      VOTE: ${VOTE:-}
      BG: ${BG:-}
      NODE_URL: lavalink:${LAVALINK_PORT:-8080}
      NODE_NAME: Main
      NODE_AUTH: ${LAVALINK_PASSWORD:-youshallnotpass}
      NODE_SECURE: "false"
      LAVALINK_WAIT_TIMEOUT_MS: ${LAVALINK_WAIT_TIMEOUT_MS:-120000}
    expose:
      - "8080"

  mongo:
    image: mongo:6
    restart: unless-stopped
    mem_limit: ${MONGO_MEMORY_LIMIT:-256m}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  lavalink:
    image: fredboat/lavalink:3.7.8
    restart: unless-stopped
    mem_limit: ${LAVALINK_MEMORY_LIMIT:-512m}
    environment:
      LAVALINK_PORT: ${LAVALINK_PORT:-8080}
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      SERVER_PORT: ${LAVALINK_PORT:-8080}
      _JAVA_OPTIONS: ${LAVALINK_JAVA_OPTIONS:--Xmx384m}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro

volumes:
  mongo-data:
